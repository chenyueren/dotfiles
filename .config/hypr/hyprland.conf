
########################################################################################
AUTOGENERATED HYPR CONFIG.
PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# ----------------------------------------
# 螢幕與工作區的設定
# ----------------------------------------

# See https://wiki.hyprland.org/Configuring/Monitors/

monitor=,preferred,auto,2


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exe-once = waybar & hyprpaper & firefox
# 

# ----------------------------------------
# 自動啟動
# ----------------------------------------

# 啟動應用通知機制
exec-once = dunst
# 螢幕分享、檔案檢取…等功能
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# 認証代理
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = /usr/bin/gnome-keyring-daemon -f -c ssh
# 狀態列工具
exec-once = waybar
# 設定桌布
exec-once = hyprpaper
# 剪貼簿管理
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# 中文輸入法
exec-once = fcitx5 --replace -d
# 待命
exec-once = ~/.config/hypr/scripts/idle.sh


# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.

# ----------------------------------------
# 設定環境變數
# ----------------------------------------

# 給 fcitx5 輸入法用的環境變數
env = XCURSOR_SIZE,24
env = GTK_IM_MODULE,fcitx5
env = QT_IM_MODULE,fcitx5
env = SDL_IM_MODULE,fcitx5
env = XMODIFIERS,@im=fcitx5

env = SSH_AUTH_SOCK,/run/user/1000/keyring/ssh

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # 視窗輸入的焦點取得方式
    follow_mouse = 1 

    touchpad {
	disable_while_typing = 1
        natural_scroll = no
	tap-to-click = 1
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 3 # 不同視窗之間的間隙大小（預設 5）
    gaps_out = 10 # 螢幕邊緣與視窗的間隙大小（預設 20）
    border_size = 2 # 視窗邊框大小
    col.active_border = rgba(ffd700ee)
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = float ,feh
windowrule = float ,pavucontrol
windowrule = float ,file_progress
windowrule = float ,confirm
windowrule = float ,dialog
windowrule = float ,download
windowrule = float ,notification
windowrule = float ,error
windowrule = float ,splash
windowrule = float ,confirmreset
windowrule = float ,title:Open File
windowrule = float ,title:branchdialog
windowrule = float ,file-roller


windowrulev2 = workspace 1 ,class: kitty
windowrulev2 = workspace 2 ,class: firefox
windowrulev2 = workspace 3 ,class: thunar
windowrulev2 = workspace 4 ,class: virt-manager
windowrulev2 = workspace 5 ,class: virt-viewer


# ----------------------------------------
# 按鍵綁定
# ----------------------------------------

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod ,q ,exec ,kitty	# 終端機
#bind = $mainMod, M, exit, # 離開 Hyprland
#bind = $mainMod ,m ,exec ,/home/chenyueren/.config/hypr/switch_maxwindow.sh
bind = $mainMod ,x , killactive, # 終止目前活動視窗
bind = $mainMod ,w ,exec ,firefox # 瀏覽器
bind = $mainMod ,v ,togglefloating, # 切換視窗為浮動
bind = $mainMod ,c ,exec ,cliphist list | wofi --show dmenu | cliphist decode | wl-copy
bind = $mainMod ,p ,pseudo, # dwindle
bind = $mainMod ,j ,togglesplit, # dwindle
bind = $mainMod shift ,r ,exec, pkill --signal 12 waybar # 重啟 waybar
bind = $mainMod ,f ,exec ,grim - | tee "~/Pictures/snapshot/$(date +'%H:%M:%S@%m-%d').png" | cliphist store
bind = $mainMod ,g ,exec ,grim -g "$(slurp -d)" - | tee "~/Pictures/snapshot/$(date +'%H:%M:%S@%m-%d').png" | cliphist store
bind = ctrl alt ,up ,exec ,~/.config/hypr/scripts/window_max.sh
bind = ctrl alt ,down ,togglefloating,
bind = ctrl alt ,right ,exec ,~/.config/hypr/scripts/window_move.sh right
bind = ctrl alt ,left ,exec ,~/.config/hypr/scripts/window_move.sh left


# 類 Windows 操作熱鍵
bind = $mainMod,r ,exec ,wofi --show drun # 使用 wofi 列出（位於 /usr/share/applications 下）可執行軟體
bind = $mainMod,e ,exec ,thunar # 檔案管理器
bind = $mainMod,l ,exec ,swaylock --image ~/.config/wallpaper/guts_office3.jpg
bind = ALT ,F4 ,killactive, # 終止目前活動視窗
bind = ,F11 ,fullscreen


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
